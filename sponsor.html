<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Melinda Wilkes | Sponsor Form</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Sponsor</h1>

    <div class="menu">
      <button class="menu-btn" id="menuBtn" aria-label="Open menu" aria-expanded="false">
        <span class="burger" aria-hidden="true">
          <span></span><span></span><span></span>
        </span>
      </button>

      <div class="menu-dropdown" id="menuDropdown" aria-hidden="true">
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
        <a href="gallery.html">Gallery</a>
        <a href="summercamps.html">Summer Camps</a>
      </div>
    </div>
  </header>

  <main class="page-card">
    <h2 style="margin-top:0;">Sponsor Interest Form</h2>
    <p class="muted" style="margin-top:0.25rem;">
      Fill this out if you are interested in being a sponsor! I will get back to you soon.
    </p>

    <div class="form-wrapper" style="margin-top:1.25rem;">
        <iframe
          src="https://docs.google.com/forms/d/e/1FAIpQLSe4fO126pV2Vbjc-ZXxs4Hgp59TldnIZiG3oXH17Fj4IHK-5w/viewform?embedded=true"
          height="1150"
          scrolling="no">
          Loading…
        </iframe>
    </div>

    <div class="form-nav">
      <a class="btn back-btn" href="summercamps.html">← Back</a>

      <a class="btn home-btn" href="index.html">Home</a>
    </div>
  </main>

  <script>
    const btn = document.getElementById("menuBtn");
    const dropdown = document.getElementById("menuDropdown");

    function closeMenu() {
      dropdown.classList.remove("open");
      btn.classList.remove("open");
      btn.setAttribute("aria-expanded", "false");
      dropdown.setAttribute("aria-hidden", "true");
    }

    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const isOpen = dropdown.classList.contains("open");
      if (isOpen) closeMenu();
      else {
        dropdown.classList.add("open");
        btn.classList.add("open");
        btn.setAttribute("aria-expanded", "true");
        dropdown.setAttribute("aria-hidden", "false");
      }
    });

    dropdown.querySelectorAll("a").forEach((link) => {
      link.addEventListener("click", (e) => {
        e.preventDefault();
        closeMenu();
        const href = link.getAttribute("href");
        setTimeout(() => { window.location.href = href; }, 150);
      });
    });

    document.addEventListener("click", () => closeMenu());
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeMenu();
    });
  </script>

</body>
</html>
